global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka-server:8761"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:4004"]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:4000"]

  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["product-service:4007"]

  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["event-service:4005"]

  - job_name: booking-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["booking-service:4008"]
